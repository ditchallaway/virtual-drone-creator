<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Render</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script>
    (async () => {
      const mission = window.__MISSION_DATA__;
      if (!mission) {
        console.error('No mission data found');
        console.log('MISSION_ERROR');
        return;
      }

      const { order_id, centroid, geometry, google_api_key, shots } = mission;

      // ── No Cesium Ion assets used — Google 3D Tiles loaded directly ──────
      Cesium.Ion.defaultAccessToken = '';

      // ── Viewer ────────────────────────────────────────────────────────────
      const viewer = new Cesium.Viewer('cesiumContainer', {
        animation: false,
        baseLayerPicker: false,
        fullscreenButton: false,
        geocoder: false,
        homeButton: false,
        infoBox: false,
        sceneModePicker: false,
        selectionIndicator: false,
        timeline: false,
        navigationHelpButton: false,
        scene3DOnly: true,
        contextOptions: { webgl: { preserveDrawingBuffer: true } },
        imageryProvider: false
      });

      viewer.scene.globe.show = false;

      // ── Google 3D Tiles ───────────────────────────────────────────────────
      let tileset;
      try {
        tileset = await Cesium.Cesium3DTileset.fromUrl(
          `https://tile.googleapis.com/v1/3dtiles/root.json?key=${google_api_key}`,
          { skipLevelOfDetail: false }
        );
        viewer.scene.primitives.add(tileset);
      } catch (err) {
        console.error('Failed to load Google 3D Tiles:', err.message);
        console.log('MISSION_ERROR');
        return;
      }

      // ── Boundary polyline ─────────────────────────────────────────────────
      try {
        const ring = geometry.coordinates[0];
        const positions = ring.map(([lon, lat]) =>
          Cesium.Cartesian3.fromDegrees(lon, lat)
        );
        viewer.entities.add({
          polyline: {
            positions,
            width: 8,
            material: Cesium.Color.YELLOW,
            clampToGround: true
          }
        });
      } catch (err) {
        console.error('Failed to draw boundary polyline:', err.message);
      }

      // ── Bounding sphere ───────────────────────────────────────────────────
      const [lon, lat] = centroid;
      const ring = geometry.coordinates[0];
      const cartesians = ring.map(([lo, la]) => Cesium.Cartesian3.fromDegrees(lo, la));
      const boundingSphere = Cesium.BoundingSphere.fromPoints(cartesians);

      // ── Helpers ───────────────────────────────────────────────────────────
      function waitForTiles(maxMs = 120000) {
        return new Promise((resolve, reject) => {
          const start = Date.now();
          let stableTicks = 0;
          const REQUIRED_TICKS = 3;
          const TICK_MS = 300;

          function check() {
            if (Date.now() - start > maxMs) {
              return reject(new Error('Tile load timeout'));
            }
            const globeReady = viewer.scene.globe.tilesLoaded;
            const tilesetReady = tileset.tilesLoaded;
            if (globeReady && tilesetReady) {
              stableTicks++;
              if (stableTicks >= REQUIRED_TICKS) return resolve();
            } else {
              stableTicks = 0;
            }
            setTimeout(check, TICK_MS);
          }
          check();
        });
      }

      function setCamera(heading, pitch, rangeMultiplier) {
        return new Promise((resolve) => {
          viewer.camera.flyToBoundingSphere(boundingSphere, {
            duration: 0,
            offset: new Cesium.HeadingPitchRange(
              Cesium.Math.toRadians(heading),
              Cesium.Math.toRadians(pitch),
              boundingSphere.radius * rangeMultiplier
            ),
            complete: resolve
          });
        });
      }

      // ── Shot definitions ──────────────────────────────────────────────────
      const SHOT_CONFIG = {
        nadir:    { heading:   0, pitch: -89.9, rangeMultiplier: 2.0 },
        cardinal: { heading:   0, pitch:  -35,  rangeMultiplier: 2.5 },
        east:     { heading:  90, pitch:  -35,  rangeMultiplier: 2.5 },
        south:    { heading: 180, pitch:  -35,  rangeMultiplier: 2.5 },
        west:     { heading: 270, pitch:  -35,  rangeMultiplier: 2.5 }
      };

      // ── Main render loop ──────────────────────────────────────────────────
      try {
        for (const shotName of shots) {
          const cfg = SHOT_CONFIG[shotName];
          if (!cfg) {
            console.error(`Unknown shot: ${shotName}`);
            continue;
          }

          await setCamera(cfg.heading, cfg.pitch, cfg.rangeMultiplier);
          await waitForTiles();

          const ok = await window.capturePass(shotName);
          if (!ok) throw new Error(`capturePass returned false for shot: ${shotName}`);
        }

        console.log('MISSION_COMPLETE');
      } catch (err) {
        console.error('Mission failed:', err.message);
        console.log('MISSION_ERROR');
      }
    })();
  </script>
</body>
</html>
