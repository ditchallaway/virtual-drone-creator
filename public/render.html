<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Drone Renderer</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script>
    (async function () {
      try {
        // Wait for mission data injected by Puppeteer
        const md = window.__MISSION_DATA__;
        if (!md) throw new Error('__MISSION_DATA__ not found');

        const { order_id, centroid, geometry, google_api_key, shots } = md;

        // Set Cesium Ion token to empty (we use Google Photorealistic tiles)
        Cesium.Ion.defaultAccessToken = '';

        // Build Google Photorealistic 3D Tiles provider
        const googleTiles = await Cesium.createGooglePhotorealistic3DTileset({
          apiKey: google_api_key || undefined
        });

        const viewer = new Cesium.Viewer('cesiumContainer', {
          terrainProvider: new Cesium.EllipsoidTerrainProvider(),
          timeline: false,
          animation: false,
          baseLayerPicker: false,
          geocoder: false,
          homeButton: false,
          sceneModePicker: false,
          navigationHelpButton: false,
          infoBox: false,
          selectionIndicator: false,
          requestRenderMode: false,
          contextOptions: {
            webgl: {
              alpha: false,
              antialias: true,
              preserveDrawingBuffer: true,
              failIfMajorPerformanceCaveat: false,
              depth: true,
              stencil: false
            }
          }
        });

        // Remove default imagery
        viewer.scene.imageryLayers.removeAll();

        // Add Google Photorealistic 3D Tiles
        viewer.scene.primitives.add(googleTiles);

        // Draw yellow boundary polyline clamped to ground
        const coords = geometry.coordinates[0];
        const positions = coords.map(([lon, lat]) =>
          Cesium.Cartographic.toCartesian(Cesium.Cartographic.fromDegrees(lon, lat))
        );

        viewer.entities.add({
          polyline: {
            positions: new Cesium.ConstantProperty(positions),
            width: 3,
            material: Cesium.Color.YELLOW,
            clampToGround: true
          }
        });

        const [lon, lat] = centroid;

        // Shot definitions
        const shotDefs = {
          nadir:    { heading: 0,   pitch: -89.9, range: 600 },
          cardinal: { heading: 0,   pitch: -35,   range: 600 },
          east:     { heading: 90,  pitch: -35,   range: 600 },
          south:    { heading: 180, pitch: -35,   range: 600 },
          west:     { heading: 270, pitch: -35,   range: 600 }
        };

        // Wait for tiles to stabilise: 3 consecutive stable ticks at 300ms, timeout 120s
        async function waitForTiles() {
          return new Promise((resolve, reject) => {
            const TICK_MS = 300;
            const REQUIRED_TICKS = 3;
            const TIMEOUT_MS = 120000;
            let stableTicks = 0;
            const start = Date.now();

            function check() {
              if (Date.now() - start > TIMEOUT_MS) {
                return reject(new Error('waitForTiles timeout'));
              }
              const tilesLoading = viewer.scene.globe.tilesLoaded === false;
              const pending = viewer.scene.primitives.length > 0 &&
                              googleTiles.statistics &&
                              (googleTiles.statistics.numberOfPendingRequests > 0 ||
                               googleTiles.statistics.numberOfTilesProcessing > 0);
              if (!tilesLoading && !pending) {
                stableTicks++;
                if (stableTicks >= REQUIRED_TICKS) return resolve();
              } else {
                stableTicks = 0;
              }
              setTimeout(check, TICK_MS);
            }
            setTimeout(check, TICK_MS);
          });
        }

        // Execute each shot in sequence
        for (const shotName of shots) {
          const def = shotDefs[shotName];
          if (!def) continue;

          viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(lon, lat, def.range),
            orientation: {
              heading: Cesium.Math.toRadians(def.heading),
              pitch:   Cesium.Math.toRadians(def.pitch),
              roll:    0.0
            }
          });

          // Force render and wait for tiles
          viewer.scene.render();
          await waitForTiles();
          viewer.scene.render();

          // Capture via Puppeteer-exposed function
          await window.capturePass(shotName);
        }

        console.log('MISSION_COMPLETE');
      } catch (err) {
        console.error('Render error:', err.message || err);
        console.log('MISSION_ERROR');
      }
    })();
  </script>
</body>
</html>
