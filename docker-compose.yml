version: '3.9'

services:
  vdc:
    build: .
    ports:
      - "3000:3000"
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
    volumes:
      - ./data/jobs:/data/jobs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 15s