name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and start service
        run: docker compose up -d --build

      - name: Wait for service to become healthy
        # 'docker compose wait' waits for containers to exit, not become healthy.
        # We poll the health status reported by the Docker daemon instead.
        run: |
          echo "Waiting for vdc to become healthy..."
          timeout 120 bash -c '
            until docker inspect \
              --format "{{.State.Health.Status}}" \
              $(docker compose ps -q vdc) 2>/dev/null \
              | grep -q "^healthy$"; do
              echo "Still waiting..."
              sleep 5
            done
          '
          echo "Service is healthy."

      - name: Run test1 (Cesium viewer initialisation)
        run: npm run test1

      - name: Run test2 (Cesium viewer screenshot)
        run: npm run test2

      - name: Stop service
        if: always()
        run: docker compose down
